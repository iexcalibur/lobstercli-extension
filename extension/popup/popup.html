<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LobsterCLI</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <span class="logo">&#x1F99E;</span>
        <h1>LobsterCLI</h1>
      </div>
      <div class="header-right">
        <button id="btn-new-chat" class="icon-btn" title="New chat">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2a.75.75 0 0 1 .75.75v4.5h4.5a.75.75 0 0 1 0 1.5h-4.5v4.5a.75.75 0 0 1-1.5 0v-4.5h-4.5a.75.75 0 0 1 0-1.5h4.5v-4.5A.75.75 0 0 1 8 2z"/></svg>
        </button>
        <button id="btn-settings" class="icon-btn" title="Settings">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492zM5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0z"/><path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.893 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52l-.094-.319z"/></svg>
        </button>
      </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area" id="chat-area">
      <!-- Welcome screen -->
      <div class="welcome" id="welcome">
        <div class="welcome-greeting" id="welcome-greeting">Hello!</div>
        <div class="welcome-sub">How can I help you today?</div>

        <div class="suggestions" id="suggestions">
          <button class="suggestion-chip" data-action="summary">Summarize this page</button>
          <button class="suggestion-chip" data-action="extract">Extract as Markdown</button>
          <button class="suggestion-chip" data-action="forms">Detect all forms</button>
          <button class="suggestion-chip" data-action="links">Show key links</button>
          <button class="suggestion-chip" data-action="network">Monitor API calls</button>
          <button class="suggestion-chip" data-action="snapshot">DOM snapshot</button>
        </div>
      </div>
    </div>

    <!-- Sharing bar (shows current page context) -->
    <div class="context-bar" id="context-bar">
      <div class="context-icon">&#x1F310;</div>
      <div class="context-text" id="context-text">Loading page...</div>
      <button class="context-close" id="context-close" title="Remove page context">&times;</button>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <textarea id="chat-input" class="chat-input" placeholder="Ask about this page..." rows="1"></textarea>
      <button id="btn-send" class="send-btn" title="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3.478 2.405a.75.75 0 0 0-.926.94l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94 60.519 60.519 0 0 0 18.445-8.986.75.75 0 0 0 0-1.218A60.517 60.517 0 0 0 3.478 2.405z"/></svg>
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
